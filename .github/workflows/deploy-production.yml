name: Deploy Production VM

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.PROD_APP_ENV_FILE }}
          SERVICE_NAME: ${{ secrets.PROD_SERVICE_NAME }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script_stop: true
          envs: APP_DIR,APP_ENV_FILE,SERVICE_NAME
          script: |
            set -euo pipefail

            if [ -z "${APP_DIR:-}" ]; then
              echo "Missing secret PROD_APP_DIR"
              exit 1
            fi

            if [ -z "${APP_ENV_FILE:-}" ]; then
              echo "Missing secret PROD_APP_ENV_FILE"
              exit 1
            fi

            if [ -z "${SERVICE_NAME:-}" ]; then
              SERVICE_NAME="iaocr"
            fi

            cd "$APP_DIR"

            if [ ! -d .git ]; then
              echo "Directory is not a git repository: $APP_DIR"
              exit 1
            fi

            git fetch origin
            git checkout main
            git pull --ff-only origin main

            chmod +x scripts/deploy_production.sh
            APP_ENV_FILE="$APP_ENV_FILE" SERVICE_NAME="$SERVICE_NAME" ./scripts/deploy_production.sh
